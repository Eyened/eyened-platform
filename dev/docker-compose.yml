name: eyened-platform-dev

services:

  redis:
    image: redis:7-alpine
    env_file: .env
    environment:
      REDIS_PASSWORD: ${EYENED_REDIS_PASSWORD:?}
    ports:
      - "${EYENED_REDIS_PUBLISH_PORT:-6379}:6379"
    command: >
      sh -c 'exec redis-server --requirepass "$$REDIS_PASSWORD"'
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG']
      interval: 5s
      timeout: 3s
      retries: 5

  fileserver:
    env_file: .env
    image: nginx:latest
    ports:
      - "${DEV_NGINX_PORT}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro
      # add thumbnails and filestorage mounts here
      #- <thumbnails_path>:/storage/thumbnails:ro
      #- <filestorage_mount>:<filestorage_mount>:ro
      
    depends_on:
      - server
      - client

  server:
    env_file: .env
    build:
      context: ..
      dockerfile: dev/Dockerfile.server
    environment:
      EYENED_REDIS_HOST: redis
      EYENED_REDIS_PORT: "6379"
      EYENED_REDIS_PASSWORD: ${EYENED_REDIS_PASSWORD:?}
    volumes:
      - ../server:/app/server
      - ../orm:/app/orm
      # current solution for zarr storage is to mount it to the server container
      #- <filestorage_mount>:<filestorage_mount>:ro
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy

  client:
    build:
      context: ..
      dockerfile: dev/Dockerfile.client
    volumes:
      - ../client:/app/client
      - client_node_modules:/app/client/node_modules

volumes:
  client_node_modules:
