name: eyened-platform-dev-bart

services:
  
  fileserver:
    env_file: .env
    build:
      context: .
      dockerfile: Dockerfile.fileserver
    environment:
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
      NGINX_ENVSUBST_TEMPLATE_DIR: /etc/nginx/templates
    network_mode: "host"
    volumes:
      - ${IMAGES_BASEPATH}:/images
      - ${THUMBNAILS_PATH}:/thumbnails

  database:
    env_file: .env
    image: mysql:8.4
    environment:
      MYSQL_USER: ${DATABASE_USER:-eyened}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD:-eyened}
      MYSQL_DATABASE: ${DATABASE_NAME:-eyened_database}
      MYSQL_RANDOM_ROOT_PASSWORD: yes
    ports:
      - "${DATABASE_PORT}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DATABASE_ROOT_PASSWORD}"]
      interval: 2s
      timeout: 5s
      retries: 10
 
  adminer:
    env_file: .env
    image: adminer:latest
    restart: always
    ports:
      - "${DEV_ADMINER_PORT}:8080"
    depends_on:
      database:
        condition: service_healthy
    environment:
      - ADMINER_DEFAULT_SERVER=database
