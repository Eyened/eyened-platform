name: eyened-platform-dev

services:
  
  fileserver:
    env_file: .env
    image: nginx:latest
    ports:
      - "${DEV_NGINX_PORT}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro
      # add thumbnails and filestorage mounts here
      #- <thumbnails_path>:/storage/thumbnails:ro
      #- <filestorage_mount>:<filestorage_mount>:ro
      
    depends_on:
      - server
      - client

  server:
    env_file: .env
    build:
      context: ..
      dockerfile: dev/Dockerfile.server
    volumes:
      - ../server:/app/server
      - ../orm:/app/orm
      # current solution for zarr storage is to mount it to the server container
      #- <filestorage_mount>:<filestorage_mount>:ro
    depends_on:
      database:
        condition: service_healthy

  client:
    build:
      context: ..
      dockerfile: dev/Dockerfile.client
    volumes:
      - ../client:/app/client
      - client_node_modules:/app/client/node_modules

volumes:
  client_node_modules:
