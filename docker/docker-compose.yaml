name: eyened-platform

services:

  redis:
    image: redis:7-alpine
    env_file: .env
    environment:
      REDIS_PASSWORD: ${EYENED_REDIS_PASSWORD:?}
    ports:
      - "${EYENED_REDIS_PUBLISH_PORT:-6379}:6379"
    command: >
      sh -c 'exec redis-server --requirepass "$$REDIS_PASSWORD"'
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG']
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ../
      dockerfile: ./docker/Dockerfile.server
    env_file: .env
    environment:
      EYENED_REDIS_HOST: redis
      EYENED_REDIS_PORT: "6379"
      EYENED_REDIS_PASSWORD: ${EYENED_REDIS_PASSWORD:?}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/health?src=docker-compose', timeout=2).read()
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    volumes:
      - ${EYENED_STORAGE_ROOT}:${EYENED_STORAGE_ROOT}

  client:
    build:
      context: ../
      dockerfile: ./docker/Dockerfile.client

  fileserver:
    env_file: .env
    image: nginx:latest
    ports:
      - "${PORT:-80}:80"
    depends_on:
      server:
        condition: service_healthy
      client:
        condition: service_started
    volumes:
      # nginx configuration
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro
      # Thumbnail directory served by nginx
      - ${EYENED_STORAGE_ROOT}/thumbnails:/storage/thumbnails:ro
      # Add other read-only mounts for local datasets here
