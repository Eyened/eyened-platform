name: eyened-platform

services:

  server:
    build:
      context: ../
      dockerfile: ./docker/Dockerfile.server
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/health?src=docker-compose', timeout=2).read()
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    volumes:
      # All storage volumes are volumes subpath mounts in ohk_researchdata
      # Zarr segmentations
      - type: volume
        source: ohk_researchdata
        target: /storage/segmentations.zarr
        volume:
          nocopy: true
          subpath: "${OHK_RESEARCHDATA_STORAGE_PATH}/segmentations.zarr"
      # Images (needed for image import script)
      - type: volume
        source: ohk_researchdata
        target: /images
        read_only: true
        volume:
          nocopy: true
          subpath: "${OHK_RESEARCHDATA_IMAGES_PATH}"
      # Thumbnails (needed for image import script)
      - type: volume
        source: ohk_researchdata
        target: /thumbnails
        volume:
          nocopy: true
          subpath: "${OHK_RESEARCHDATA_STORAGE_PATH}/thumbnails"

  client:
    build:
      context: ../
      dockerfile: ./docker/Dockerfile.client
    restart: unless-stopped

  fileserver:
    env_file: .env
    image: nginx:latest
    ports:
      - "${PORT:-80}:80"
      # Serve on multiple ports for now, later we will split PRD and TEST into separate containers (or compose files).
      - ${ALTPORT:-9090}:80
    depends_on:
      server:
        condition: service_healthy
      client:
        condition: service_started
    restart: unless-stopped
    volumes:
      # nginx configuration
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro
      # All storage volumes are volumes subpath mounts in ohk_researchdata
      # Images
      - type: volume
        source: ohk_researchdata
        target: /images
        read_only: true
        volume:
          nocopy: true
          subpath: "${OHK_RESEARCHDATA_IMAGES_PATH}"
      # Thumbnails
      - type: volume
        source: ohk_researchdata
        target: /thumbnails
        read_only: true
        volume:
          nocopy: true
          subpath: "${OHK_RESEARCHDATA_STORAGE_PATH}/thumbnails"

volumes:
  ohk_researchdata:
    driver: local
    driver_opts:
      type: cifs
      device: "${OHK_RESEARCHDATA_CIFS_SHARE}"
      o: "username=${OHK_RESEARCHDATA_CIFS_USERNAME},password=${OHK_RESEARCHDATA_CIFS_PASSWORD}"
